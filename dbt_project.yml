name: netflix_lakehouse
version: '1.0.0'
config-version: 2
profile: netflix_lakehouse

model-paths: ["models"]
seed-paths: ["seeds"]
test-paths: ["tests"]
snapshot-paths: ["snapshots"]
analysis-paths: ["analyses"]
macro-paths: ["macros"]

target-path: "target"
clean-targets: ["target", "dbt_packages"]

seeds:
  netflix_lakehouse:
    +schema: seeds
    +quote_columns: false
    ratings:
      # NOT seeded — the 25M-row COPY OOM-kills the ~6GB Airflow container. The CSV
      # stays in seeds/ and is streamed by models/bronze/raw_ratings.sql via read_csv.
      +enabled: false
    movies:
      # MovieLens movies.csv has RFC-4180 escaped quotes (e.g. movieId 7789:
      # "11'09""01 - September 11 (2002)"). DuckDB 1.5.x's fast COPY parser
      # auto-detects escape=(empty) and rejects them in strict mode, so route
      # this small (~62k-row) seed through dbt-duckdb's agate loader instead.
      # ratings/tags stay on the fast COPY path.
      +fast: false
    users:
      +column_types:
        user_id: integer
        membership_tier: varchar
        region: varchar
        device_preference: varchar
        created_at: date

models:
  netflix_lakehouse:
    bronze:
      +materialized: view
      +schema: bronze
    silver:
      +materialized: view
      +schema: silver
    gold:
      +materialized: table
      +schema: gold

snapshots:
  netflix_lakehouse:
    +target_schema: gold
    +strategy: check
    +check_cols: [membership_tier, region, device_preference]

vars:
  current_year: 2026
